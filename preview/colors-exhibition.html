<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  @font-face{font-family:'FZLanTingHei';src:url('../fonts/______GBK.TTF') format('truetype');font-weight:900;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'FZLanTingHei','Inter',sans-serif;background:#172F60;padding:20px;-webkit-font-smoothing:antialiased;}
  .label{font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:8px;margin-top:14px;font-family:'Inter',sans-serif;}
  .label:first-child{margin-top:0;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .swatch{border-radius:10px;overflow:hidden;flex:1;min-width:80px;}
  .sw-color{height:52px;}
  .sw-info{background:rgba(255,255,255,0.07);padding:8px 10px;}
  .sw-name{font-size:10px;font-weight:700;color:rgba(255,255,255,0.85);}
  .sw-hex{font-size:10px;color:rgba(255,255,255,0.4);font-family:monospace;margin-top:1px;}
  .gold-demo{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:18px 24px;margin-top:14px;text-align:center;}
  .gold-title{font-size:32px;font-weight:900;background:linear-gradient(90deg,#D4A832,#F5C842,#D4A832);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.06em;line-height:1.2;}
  .gold-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:0.2em;text-transform:uppercase;margin-top:6px;font-family:'Inter',sans-serif;}
  .prod-row{display:flex;gap:10px;margin-top:4px;}
  .prod-badge{flex:1;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;}
  .prod-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .prod-name{font-size:12px;font-weight:700;color:#fff;}
  .prod-en{font-size:9px;opacity:0.5;font-family:'Inter',sans-serif;margin-top:2px;}
</style>
</head><body>

<div class="label">✅ 品牌確認色號</div>
<div class="row">
  <div class="swatch" style="flex:2;">
    <div class="sw-color" style="background:#172F60;border:2px solid rgba(255,255,255,0.3);"></div>
    <div class="sw-info"><div class="sw-name">Brand Navy ✅</div><div class="sw-hex">#172F60</div></div>
  </div>
  <div class="swatch" style="flex:2;">
    <div class="sw-color" style="background:#CE0E2D;"></div>
    <div class="sw-info"><div class="sw-name">Brand Red ✅</div><div class="sw-hex">#CE0E2D</div></div>
  </div>
  <div class="swatch">
    <div class="sw-color" style="background:#1565C0;"></div>
    <div class="sw-info"><div class="sw-name">Electric Blue</div><div class="sw-hex">#1565C0</div></div>
  </div>
  <div class="swatch">
    <div class="sw-color" style="background:#1E90FF;"></div>
    <div class="sw-info"><div class="sw-name">Blue Glow</div><div class="sw-hex">#1E90FF</div></div>
  </div>
</div>

<div class="label">Brand — 妙利散 × R-CHEVER 裕心</div>
<div class="prod-row">
  <div class="prod-badge" style="background:rgba(220,65,30,0.15);border:1px solid rgba(220,65,30,0.35);">
    <div class="prod-dot" style="background:#CE0E2D;"></div>
    <div><div class="prod-name">妙利散® BM</div><div class="prod-en">MIYARISAN · #CE0E2D</div></div>
  </div>
  <div class="prod-badge" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);">
    <div class="prod-dot" style="background:#fff;"></div>
    <div><div class="prod-name">R-CHEVER 裕心</div><div class="prod-en">Parent Brand · #172F60 / #CE0E2D</div></div>
  </div>
</div>

</body></html>
