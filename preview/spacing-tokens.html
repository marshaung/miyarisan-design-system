<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter',sans-serif; background: #f7f8fa; padding: 20px 24px; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #9ca3af; margin-bottom: 10px; margin-top: 16px; }
  .label:first-child { margin-top: 0; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .sp-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .sp-bar { background: linear-gradient(135deg,#C8194B,#E5186E); border-radius: 3px; height: 8px; }
  .sp-meta { font-size: 10px; color: #374151; font-weight: 600; text-align: center; }
  .sp-token { font-size: 9px; color: #9ca3af; font-family: monospace; }
  .radius-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .radius-box { width: 60px; height: 60px; background: #fff; border: 2px solid #8b1a2e; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .radius-label { font-size: 10px; font-weight: 700; color: #374151; text-align: center; }
  .radius-val { font-size: 9px; color: #9ca3af; font-family: monospace; text-align: center; }
  .radius-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
</style>
</head><body>
<div class="label">Spacing Scale</div>
<div class="row">
  <div class="sp-item"><div class="sp-bar" style="width:4px;"></div><div class="sp-meta">4px</div><div class="sp-token">--space-1</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:8px;"></div><div class="sp-meta">8px</div><div class="sp-token">--space-2</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:12px;"></div><div class="sp-meta">12px</div><div class="sp-token">--space-3</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:16px;"></div><div class="sp-meta">16px</div><div class="sp-token">--space-4</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:20px;"></div><div class="sp-meta">20px</div><div class="sp-token">--space-5</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:24px;"></div><div class="sp-meta">24px</div><div class="sp-token">--space-6</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:32px;"></div><div class="sp-meta">32px</div><div class="sp-token">--space-8</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:48px;"></div><div class="sp-meta">48px</div><div class="sp-token">--space-12</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:64px;"></div><div class="sp-meta">64px</div><div class="sp-token">--space-16</div></div>
  <div class="sp-item"><div class="sp-bar" style="width:88px;"></div><div class="sp-meta">88px</div><div class="sp-token">--space-22</div></div>
</div>

<div class="label">Border Radius</div>
<div class="radius-row">
  <div class="radius-wrap"><div class="radius-box" style="border-radius:6px;"></div><div class="radius-label">xs</div><div class="radius-val">6px</div></div>
  <div class="radius-wrap"><div class="radius-box" style="border-radius:10px;"></div><div class="radius-label">sm</div><div class="radius-val">10px</div></div>
  <div class="radius-wrap"><div class="radius-box" style="border-radius:16px;"></div><div class="radius-label">default</div><div class="radius-val">16px</div></div>
  <div class="radius-wrap"><div class="radius-box" style="border-radius:24px;"></div><div class="radius-label">lg</div><div class="radius-val">24px</div></div>
  <div class="radius-wrap"><div class="radius-box" style="border-radius:9999px; width:90px; height:36px;"></div><div class="radius-label">pill</div><div class="radius-val">9999px</div></div>
</div>
</body></html>
