<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:#f0f2f5; padding:20px; }
  .row { display:flex; gap:16px; align-items:stretch; }
  .img-card { border-radius:12px; overflow:hidden; flex:1; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
  .img-card img { width:100%; height:160px; object-fit:cover; display:block; }
  .img-meta { background:#fff; padding:8px 12px; font-size:10px; font-weight:700; color:#6b7280; }
  .img-sub { font-size:10px; color:#9ca3af; margin-top:2px; font-weight:400; }
</style>
</head><body>
<div class="row">
  <div class="img-card">
    <img src="../assets/product-box.png" alt="Product Box" style="object-fit:contain;background:#fff;">
    <div class="img-meta">妙利散® BM 盒裝<div class="img-sub">product-box.png · 1g/包×42包</div></div>
  </div>
  <div class="img-card">
    <img src="../assets/homepage-draft.jpg" alt="Homepage Draft">
    <div class="img-meta">首頁初稿（桃紅色主題）<div class="img-sub">homepage-draft.jpg · Pink/Red landing page</div></div>
  </div>
  <div class="img-card">
    <img src="../assets/homepage-dark.png" alt="Homepage Dark">
    <div class="img-meta">首頁深藍版本<div class="img-sub">homepage-dark.png · Navy dark theme</div></div>
  </div>
</div>
</body></html>
