<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  @font-face { font-family:'FZLanTingHei'; src:url('../fonts/____GBK.TTF') format('truetype'); font-weight:400; }
  @font-face { font-family:'FZLanTingHei'; src:url('../fonts/2-_____GBK.TTF') format('truetype'); font-weight:700; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'FZLanTingHei','Noto Sans TC',sans-serif; background:#f0f2f5; -webkit-font-smoothing:antialiased; }
  .label { font-size:10px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:#9ca3af; padding:14px 16px 6px; font-family:'Inter',sans-serif; }

  /* Light Nav */
  .nav { background:rgba(255,255,255,0.92); backdrop-filter:blur(16px); border-bottom:1px solid #e5e7eb; height:64px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; }
  .nav-logo { font-size:16px; font-weight:700; color:#111827; display:flex; align-items:center; gap:8px; }
  .nav-dot { width:8px; height:8px; border-radius:50%; background:#8b1a2e; }
  .nav-links { display:flex; gap:2px; list-style:none; }
  .nav-links a { font-size:13px; font-weight:500; color:#6b7280; padding:6px 14px; border-radius:9999px; text-decoration:none; transition:all 0.18s; }
  .nav-links a:hover { color:#111827; background:#f7f8fa; }
  .nav-links a.active { color:#8b1a2e; font-weight:700; background:#fdf2f4; }
  .nav-btn { font-size:12px; font-weight:700; padding:8px 20px; border-radius:9999px; background:#8b1a2e; color:#fff; border:none; cursor:pointer; font-family:inherit; }

  /* Dark Nav */
  .nav-dark { background:#0B1A35; height:64px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; }
  .nav-dark .nav-logo { color:#fff; }
  .nav-dark .nav-links a { color:rgba(255,255,255,0.6); }
  .nav-dark .nav-links a:hover { color:#fff; background:rgba(255,255,255,0.08); }
  .nav-dark .nav-links a.active { color:#fff; background:rgba(255,255,255,0.12); }
  .nav-dark .nav-btn { background:linear-gradient(135deg,#C8194B,#E5186E); }

  /* Tab bar */
  .tabs { background:#fff; border-bottom:1px solid #e5e7eb; padding:0 32px; display:flex; gap:0; }
  .tab { padding:14px 22px; font-size:13.5px; font-weight:500; color:#6b7280; border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; letter-spacing:0.03em; font-family:inherit; }
  .tab.active { color:#8b1a2e; font-weight:700; border-bottom-color:#8b1a2e; }
</style>
</head><body>

<div class="label">Light Nav (Frosted Glass)</div>
<nav class="nav">
  <div class="nav-logo"><span class="nav-dot"></span>妙利散</div>
  <ul class="nav-links">
    <li><a href="#">首頁</a></li>
    <li><a href="#">益生菌影響層面</a></li>
    <li><a href="#" class="active">醫療級酪酸菌</a></li>
    <li><a href="#">次世代益生菌</a></li>
  </ul>
  <button class="nav-btn">查看研究報告</button>
</nav>

<div class="label">Dark Nav (Navy)</div>
<nav class="nav-dark">
  <div class="nav-logo"><span class="nav-dot"></span>妙利散</div>
  <ul class="nav-links">
    <li><a href="#">首頁</a></li>
    <li><a href="#">益生菌影響層面</a></li>
    <li><a href="#" class="active">醫療級酪酸菌</a></li>
    <li><a href="#">次世代益生菌</a></li>
  </ul>
  <button class="nav-btn">查看研究報告</button>
</nav>

<div class="label">Tab Bar</div>
<div class="tabs">
  <div class="tab active">菌株特色與差異比較</div>
  <div class="tab">實驗報告</div>
  <div class="tab">常見問題</div>
</div>
</body></html>
