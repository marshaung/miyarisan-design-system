<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC','Inter',sans-serif; background: #f7f8fa; padding: 24px; -webkit-font-smoothing: antialiased; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .row:last-child { margin-bottom: 0; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #9ca3af; margin-bottom: 10px; margin-top: 16px; }
  .label:first-child { margin-top: 0; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; border-radius: 9999px; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; border: none; cursor: pointer; font-family: inherit; transition: all 0.18s; }
  .btn-sm { padding: 7px 16px; font-size: 12px; }
  .btn-lg { padding: 14px 30px; font-size: 15px; }

  .btn-primary { background: #8b1a2e; color: #fff; }
  .btn-primary:hover { background: #a82040; box-shadow: 0 4px 16px rgba(139,26,46,0.28); transform: translateY(-1px); }
  .btn-brand { background: linear-gradient(135deg,#C8194B,#E5186E); color: #fff; }
  .btn-outline { background: transparent; color: #374151; border: 1.5px solid #d1d5db; }
  .btn-outline:hover { border-color: #8b1a2e; color: #8b1a2e; background: #fdf2f4; }
  .btn-ghost { background: transparent; color: #8b1a2e; }
  .btn-ghost:hover { background: #fdf2f4; }
  .btn-dark { background: #0B1A35; color: #fff; }

  .dark-bg { background: #0B1A35; padding: 16px; border-radius: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn-dark-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.3); }
  .btn-dark-outline:hover { border-color: #fff; background: rgba(255,255,255,0.08); }
  .btn-brand-on-dark { background: linear-gradient(135deg,#C8194B,#E5186E); color: #fff; }
</style>
</head><body>
<div class="label">Primary Actions</div>
<div class="row">
  <button class="btn btn-primary">查看研究報告</button>
  <button class="btn btn-brand">了解菌株特色 →</button>
  <button class="btn btn-outline">了解購買途徑</button>
  <button class="btn btn-ghost">更多資訊</button>
</div>

<div class="label">Sizes</div>
<div class="row">
  <button class="btn btn-sm btn-primary">小按鈕 SM</button>
  <button class="btn btn-primary">標準 MD</button>
  <button class="btn btn-lg btn-primary">大按鈕 LG</button>
</div>

<div class="label">On Dark Background (Navy)</div>
<div class="dark-bg">
  <button class="btn btn-brand-on-dark">了解菌株特色 →</button>
  <button class="btn btn-dark-outline">查看研究報告</button>
</div>

<div class="label">Nav Button</div>
<div class="row">
  <button class="btn btn-sm btn-primary" style="border-radius:9999px;">查看研究報告</button>
  <button class="btn btn-sm btn-outline">醫療級酪酸菌</button>
</div>
</body></html>
